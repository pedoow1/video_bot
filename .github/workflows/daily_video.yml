name: 🎬 Daily Video Bot

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  video-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🎥 Install FFmpeg & yt-dlp (Latest)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: 🔑 Load YouTube Cookies
        uses: AnimMouse/setup-yt-dlp/cookies@v3
        with:
          cookies: ${{ secrets.YOUTUBE_COOKIES }}

      - name: 📦 Install Requirements
        run: pip install -r requirements.txt

      - name: 🚀 Run Video Fetcher & Uploader
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          # YOUTUBE_API_KEY لو كنت مستخدمه
        run: python main.py --now --cats
