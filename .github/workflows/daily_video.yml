name: 🎬 Video Bot - Daily Upload

on:
  schedule:
    - cron: '0 16 * * *'   # يشتغل يوميًا
  workflow_dispatch:

jobs:
  make-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🎞️ Install FFmpeg + yt-dlp (مع Cookies Support)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      # ←←←←← الجزء المهم: Cookies
      - name: 🔑 Load YouTube Cookies
        uses: AnimMouse/setup-yt-dlp/cookies@v3
        with:
          cookies: ${{ secrets.YOUTUBE_COOKIES }}

      - name: 📦 Install deps
        run: |
          pip install -r requirements.txt

      - name: 🚀 Run Video Bot
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          # ... باقي الـ secrets
        run: python main.py --cats
